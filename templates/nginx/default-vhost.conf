# ══════════════════════════════════════════════════════════════════════════
# MEGA-STACK v2.5 — Nginx Default Virtual Host (Temiz Kurulum)
# Hedef: /opt/mega-stack/nginx/vhosts/default.conf
# Kullanıcı kurulumu tamamlandığında "Hoş Geldiniz" sayfası sunar.
# ══════════════════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    server_name {{ domain }} www.{{ domain }};
    root /sites/{{ domain }};
    index index.html index.htm;

    # Ana sayfa
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Statik dosyalar için cache
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Güvenlik: gizli dosyaları engelle
    location ~ /\. {
        deny all;
    }

    # Güvenlik: PHP dosya yükleme engeli
    location ~* \.php$ {
        deny all;
    }

    # Sağlık kontrolü
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
