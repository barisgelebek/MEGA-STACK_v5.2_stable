# ══════════════════════════════════════════════════════════════════════════
# MEGA-STACK v2.5 — Traefik Statik Konfigürasyon Şablonu
# Hedef: /opt/mega-stack/traefik/traefik.yml
# ══════════════════════════════════════════════════════════════════════════

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

ping: {}

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mega-stack_webnet
  file:
    directory: /dynamic-config
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "{{ admin_email }}"
      storage: "acme.json"
      httpChallenge:
        entryPoint: "web"

serversTransport:
  insecureSkipVerify: true
