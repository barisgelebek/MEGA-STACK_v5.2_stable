# ═══════════════════════════════════════════════════════════════════════
# MEGA-STACK v2.5 — Traefik Dynamic Configuration
# CrowdSec Bouncer + Security Headers + Rate Limit + Compress
# Dosya Yolu: traefik/dynamic/dynamic_conf.yml
# ═══════════════════════════════════════════════════════════════════════

http:
  # ── Middleware'ler ──
  middlewares:

    # CrowdSec Bouncer — IP eşleşmeli trafik engelleme
    crowdsec:
      forwardauth:
        address: "http://crowdsec-bouncer:8080/api/v1/forwardAuth"
        trustForwardHeader: true

    # Güvenlik Başlıkları
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        sslRedirect: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    # Rate Limiting — DDoS koruması
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: "1s"

    # Sıkıştırma (PointVending için)
    compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"
